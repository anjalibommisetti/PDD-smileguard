services:
  - type: web
    name: dental-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn inference_api:app --host 0.0.0.0 --port $PORT
    autoDeploy: true

  - type: web
    name: dataset-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python dataset_api.py
    autoDeploy: true
